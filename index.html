<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring PM5350</title>
    
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #3a3a4a;
            padding-bottom: 10px;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            background-color: #e74c3c;
        }
        .connected { background-color: #2ecc71; }

        /* Grid System untuk Meter Analog */
        .grid-gauge {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background-color: #2a2a35;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        .card h3 { margin-top: 0; color: #00d2d3; }

        /* Style Meter Analog (SVG Gauge) */
        .gauge-container {
            position: relative;
            width: 160px;
            height: 100px;
            margin: 0 auto;
        }
        .gauge-svg { width: 100%; height: 100%; }
        .gauge-bg { fill: none; stroke: #4a4a5a; stroke-width: 12; stroke-linecap: round; }
        .gauge-value-arc { fill: none; stroke-width: 12; stroke-linecap: round; stroke-dasharray: 220; stroke-dashoffset: 220; transition: stroke-dashoffset 0.5s ease; }
        .gauge-v { stroke: #ff9f43; }
        .gauge-i { stroke: #10ac84; }
        .gauge-text {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            font-size: 22px;
            font-weight: bold;
        }
        .phase-label {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 14px;
            background: #1e1e24;
            padding: 8px;
            border-radius: 6px;
        }

        /* Grid System untuk Grafik */
        .grid-chart {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
        }
        @media(max-width: 600px) {
            .grid-chart { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Schneider PM5350 Live Dashboard</h1>
        <div id="status" class="status-badge">Menghubungkan ke Broker via WSS...</div>
    </header>

    <div class="grid-gauge">
        <div class="card">
            <h3>Meter Tegangan (L-N)</h3>
            <div style="display: flex; justify-content: space-around;">
                <div>
                    <div class="gauge-container">
                        <svg class="gauge-svg" viewBox="0 0 100 60">
                            <path class="gauge-bg" d="M 10 50 A 40 40 0 0 1 90 50" />
                            <path id="arc-va" class="gauge-value-arc gauge-v" d="M 10 50 A 40 40 0 0 1 90 50" />
                        </svg>
                        <div id="txt-va" class="gauge-text">0V</div>
                    </div>
                    <div style="color:#ff9f43; margin-top:5px; font-weight:bold;">Phase R</div>
                </div>
                <div>
                    <div class="gauge-container">
                        <svg class="gauge-svg" viewBox="0 0 100 60">
                            <path class="gauge-bg" d="M 10 50 A 40 40 0 0 1 90 50" />
                            <path id="arc-vb" class="gauge-value-arc gauge-v" d="M 10 50 A 40 40 0 0 1 90 50" />
                        </svg>
                        <div id="txt-vb" class="gauge-text">0V</div>
                    </div>
                    <div style="color:#ff9f43; margin-top:5px; font-weight:bold;">Phase S</div>
                </div>
                <div>
                    <div class="gauge-container">
                        <svg class="gauge-svg" viewBox="0 0 100 60">
                            <path class="gauge-bg" d="M 10 50 A 40 40 0 0 1 90 50" />
                            <path id="arc-vc" class="gauge-value-arc gauge-v" d="M 10 50 A 40 40 0 0 1 90 50" />
                        </svg>
                        <div id="txt-vc" class="gauge-text">0V</div>
                    </div>
                    <div style="color:#ff9f43; margin-top:5px; font-weight:bold;">Phase T</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Meter Arus</h3>
            <div style="display: flex; justify-content: space-around;">
                <div>
                    <div class="gauge-container">
                        <svg class="gauge-svg" viewBox="0 0 100 60">
                            <path class="gauge-bg" d="M 10 50 A 40 40 0 0 1 90 50" />
                            <path id="arc-ia" class="gauge-value-arc gauge-i" d="M 10 50 A 40 40 0 0 1 90 50" />
                        </svg>
                        <div id="txt-ia" class="gauge-text">0A</div>
                    </div>
                    <div style="color:#10ac84; margin-top:5px; font-weight:bold;">Phase R</div>
                </div>
                <div>
                    <div class="gauge-container">
                        <svg class="gauge-svg" viewBox="0 0 100 60">
                            <path class="gauge-bg" d="M 10 50 A 40 40 0 0 1 90 50" />
                            <path id="arc-ib" class="gauge-value-arc gauge-i" d="M 10 50 A 40 40 0 0 1 90 50" />
                        </svg>
                        <div id="txt-ib" class="gauge-text">0A</div>
                    </div>
                    <div style="color:#10ac84; margin-top:5px; font-weight:bold;">Phase S</div>
                </div>
                <div>
                    <div class="gauge-container">
                        <svg class="gauge-svg" viewBox="0 0 100 60">
                            <path class="gauge-bg" d="M 10 50 A 40 40 0 0 1 90 50" />
                            <path id="arc-ic" class="gauge-value-arc gauge-i" d="M 10 50 A 40 40 0 0 1 90 50" />
                        </svg>
                        <div id="txt-ic" class="gauge-text">0A</div>
                    </div>
                    <div style="color:#10ac84; margin-top:5px; font-weight:bold;">Phase T</div>
                </div>
            </div>
        </div>
    </div>

    <div class="grid-chart">
        <div class="card">
            <h3>Tren Sejarah Tegangan (V)</h3>
            <canvas id="chartTegangan"></canvas>
        </div>
        <div class="card">
            <h3>Tren Sejarah Arus (A)</h3>
            <canvas id="chartArus"></canvas>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURASI MQTT CLIENT VIA WSS ---
    // Menggunakan broker port secure web socket (8884) milik HiveMQ
    const brokerUrl = 'wss://broker.hivemq.com:8884/mqtt'; 
    const topic = '/aisi555/PM5350';

    const client = mqtt.connect(brokerUrl);
    const statusBadge = document.getElementById('status');

    client.on('connect', () => {
        statusBadge.textContent = 'Tersambung ke MQTT';
        statusBadge.className = 'status-badge connected';
        client.subscribe(topic);
    });

    client.on('offline', () => {
        statusBadge.textContent = 'Terputus dari Broker';
        statusBadge.className = 'status-badge';
    });

    // --- INISIALISASI GRAFIK CHART.JS ---
    const maxDataPoints = 20; // Batas data di grafik history
    const chartOptions = {
        responsive: true,
        scales: {
            x: { grid: { color: '#3a3a4a' }, ticks: { color: '#aaa' } },
            y: { grid: { color: '#3a3a4a' }, ticks: { color: '#aaa' } }
        },
        plugins: { legend: { labels: { color: '#fff' } } }
    };

    // Chart Tegangan
    const ctxV = document.getElementById('chartTegangan').getContext('2d');
    const chartV = new Chart(ctxV, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'VR (V)', data: [], borderColor: '#ff9f43', tension: 0.3 },
                { label: 'VS (V)', data: [], borderColor: '#ee5253', tension: 0.3 },
                { label: 'VT (V)', data: [], borderColor: '#0abde3', tension: 0.3 }
            ]
        },
        options: chartOptions
    });

    // Chart Arus
    const ctxI = document.getElementById('chartArus').getContext('2d');
    const chartI = new Chart(ctxI, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'IR (A)', data: [], borderColor: '#10ac84', tension: 0.3 },
                { label: 'IS (A)', data: [], borderColor: '#5f27cd', tension: 0.3 },
                { label: 'IT (A)', data: [], borderColor: '#ff6b6b', tension: 0.3 }
            ]
        },
        options: chartOptions
    });

    // --- FUNGSIONALITAS UPDATE METER ANALOG (SVG GAUGE) ---
    // Fungsi memetakan nilai ke animasi stroke-dashoffset SVG
    // Max V diatur 300V, Max I diatur 10A (Bisa disesuaikan beban)
    function updateGauge(arcId, txtId, val, maxVal, unit) {
        const arc = document.getElementById(arcId);
        const txt = document.getElementById(txtId);
        
        txt.textContent = val.toFixed(unit === 'V' ? 1 : 2) + unit;
        
        // Batasi nilai agar tidak overshoot dari gauge
        let safeVal = Math.min(val, maxVal);
        // Hitung persentase, panjang total stroke gauge arc adalah 220
        let offset = 220 - ((safeVal / maxVal) * 220);
        arc.style.strokeDashoffset = offset;
    }

    // --- PROSES MENERIMA DATA DARI WEMOS ---
    client.on('message', (receivedTopic, payload) => {
        if(receivedTopic === topic) {
            try {
                // Parsing data string JSON mentah dari Wemos
                const data = JSON.parse(payload.toString());
                const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                // 1. Perbarui Semua Meter Analog (Gauge)
                updateGauge('arc-va', 'txt-va', data.v_a, 300, 'V');
                updateGauge('arc-vb', 'txt-vb', data.v_b, 300, 'V');
                updateGauge('arc-vc', 'txt-vc', data.v_c, 300, 'V');
                
                updateGauge('arc-ia', 'txt-ia', data.i_a, 10, 'A'); // Asumsi CT maks 10A, sesuaikan kebutuhan
                updateGauge('arc-ib', 'txt-ib', data.i_b, 10, 'A');
                updateGauge('arc-ic', 'txt-ic', data.i_c, 10, 'A');

                // 2. Perbarui Tren Grafik Sejarah (Line Chart)
                // Tambah data baru ke Chart Tegangan
                if(chartV.data.labels.length >= maxDataPoints) { chartV.data.labels.shift(); chartV.data.datasets.forEach(d => d.data.shift()); }
                chartV.data.labels.push(now);
                chartV.data.datasets[0].data.push(data.v_a);
                chartV.data.datasets[1].data.push(data.v_b);
                chartV.data.datasets[2].data.push(data.v_c);
                chartV.data.update();

                // Tambah data baru ke Chart Arus
                if(chartI.data.labels.length >= maxDataPoints) { chartI.data.labels.shift(); chartI.data.datasets.forEach(d => d.data.shift()); }
                chartI.data.labels.push(now);
                chartI.data.datasets[0].data.push(data.i_a);
                chartI.data.datasets[1].data.push(data.i_b);
                chartI.data.datasets[2].data.push(data.i_c);
                chartI.data.update();

            } catch (e) {
                console.error("Gagal membaca struktur teks JSON:", e);
            }
        }
    });
</script>
</body>
</html>
